<!-- STITCH_THREEJS_START:ANIMATION_2 class="" -->
<div class="" style="display:block;width:100%;height:100%;min-height:200px;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_2" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_2');
  const devicePixelRatio = window.devicePixelRatio || 1;
  const width = container.clientWidth || window.innerWidth;
const height = container.clientHeight || window.innerHeight;
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(width, height);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
container.appendChild(renderer.domElement);

// Floating 3D Trophy / Success Shape
const group = new THREE.Group();
scene.add(group);

const geometry = new THREE.IcosahedronGeometry(1.5, 0);
const material = new THREE.MeshPhongMaterial({
    color: 0xFFD700,
    wireframe: true,
    emissive: 0x443300,
    shininess: 100
});

const mesh = new THREE.Mesh(geometry, material);
group.add(mesh);

// Core Glow
const coreGeom = new THREE.SphereGeometry(0.8, 32, 32);
const coreMat = new THREE.MeshPhongMaterial({
    color: 0xFFD700,
    emissive: 0xFFD700,
    transparent: true,
    opacity: 0.8
});
const core = new THREE.Mesh(coreGeom, coreMat);
group.add(core);

const light = new THREE.PointLight(0xFFD700, 2, 10);
light.position.set(2, 2, 2);
scene.add(light);
scene.add(new THREE.AmbientLight(0xffffff, 0.5));

camera.position.z = 5;

function animate() {
    requestAnimationFrame(animate);
    group.rotation.y += 0.01;
    group.rotation.z += 0.005;
    core.scale.set(
        1 + Math.sin(Date.now() * 0.002) * 0.1,
        1 + Math.sin(Date.now() * 0.002) * 0.1,
        1 + Math.sin(Date.now() * 0.002) * 0.1
    );
    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
});

animate();
})();
</script>

<script>
        // Simple Micro-interaction: Mouse tracking for light reflection on the glass card
        const card = document.querySelector('.glass-card');
        document.addEventListener('mousemove', (e) => {
            if (!card) return;
            const { clientX, clientY } = e;
            const { left, top, width, height } = card.getBoundingClientRect();
            const x = ((clientX - left) / width) * 100;
            const y = ((clientY - top) / height) * 100;
            
            card.style.setProperty('--mouse-x', `${x}%`);
            card.style.setProperty('--mouse-y', `${y}%`);
            
            // Subtle tilt effect
            const rotateX = (clientY - (top + height / 2)) / 50;
            const rotateY = -(clientX - (left + width / 2)) / 50;
            card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });

        // Reset card on mouse leave
        document.addEventListener('mouseleave', () => {
            if (card) {
                card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg)`;
            }
        });
    </script>
