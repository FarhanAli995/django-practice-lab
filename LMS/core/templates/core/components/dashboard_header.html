{% load static %}
<header class="dash-header">
    <button class="dash-menu-toggle" id="dashMenuToggle" aria-label="Toggle sidebar">☰</button>
    <div class="dash-header-brand">
        <img src="{% static 'core/images/kiu.png' %}" alt="KIU" class="dash-header-logo" onerror="this.style.display='none'">
        <span>Karakoram International University</span>
    </div>
    <h1 class="dash-header-title">Learning Management System (LMS)</h1>
    <div class="dash-header-user">
        <div class="dash-user-info">
            <span class="dash-user-name">{{ student_name|default:"Student" }}</span>
            <span class="dash-user-role">Student</span>
        </div>
        <div class="dash-avatar">{{ student_name|default:"S"|slice:":1" }}</div>
    </div>
</header>
