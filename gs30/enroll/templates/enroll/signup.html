<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication</title>
    {% load static %}
<link rel="stylesheet" href="{% static 'enroll/main.css' %}">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            background: #090e17; 
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(45, 212, 191, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(167, 139, 250, 0.15) 0%, transparent 40%),
                linear-gradient(135deg, #090e17 0%, #111827 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #e2e8f0;
            overflow-x: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: 0;
        }
        .orb-1 {
            width: 400px;
            height: 400px;
            background: rgba(45, 212, 191, 0.3);
            top: -100px;
            left: -100px;
        }
        .orb-2 {
            width: 500px;
            height: 500px;
            background: rgba(139, 92, 246, 0.3);
            bottom: -150px;
            right: -100px;
        }

        .glass-panel {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 1100px;
            background: rgba(17, 24, 39, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 40px;
            display: flex;
            gap: 40px;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.7), 
                        inset 0 0 30px rgba(45, 212, 191, 0.05);
            overflow: hidden;
        }

        .auth-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 40px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            position: relative;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .auth-section.hidden {
            flex: 0;
            padding: 0;
            margin: 0;
            opacity: 0;
            pointer-events: none;
            transform: scale(0.95);
            border: none;
            box-shadow: none;
            background: transparent;
            overflow: hidden;
            min-width: 0;
        }

        .auth-section.hidden * {
            opacity: 0;
            transform: scale(0.9);
        }

        .auth-section.active {
            flex: 1;
            opacity: 1;
            transform: scale(1);
        }

        .auth-section::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin: 0 0 10px 0;
            background: linear-gradient(to right, #ffffff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            font-size: 14px;
            color: #94a3b8;
            margin-top: 0;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        .form-group, form p {
            margin: 0 0 20px 0;
            display: block;
        }

        form label {
            font-size: 13px;
            color: #cbd5e1;
            font-weight: 500;
            margin-bottom: 8px;
            display: block;
            letter-spacing: 0.5px;
        }

        form input, form select, form textarea {
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(148, 163, 184, 0.2);
            padding: 14px 16px;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
            width: 100%;
            box-sizing: border-box;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        form input:focus {
            border-color: #2dd4bf;
            box-shadow: 0 0 0 3px rgba(45, 212, 191, 0.15), inset 0 2px 4px rgba(0,0,0,0.2);
            background: rgba(15, 23, 42, 0.9);
        }

        .helptext {
            font-size: 11px;
            color: #64748b;
            margin-top: 6px;
            display: block;
        }

        ul.errorlist {
            color: #ef4444;
            font-size: 12px;
            list-style: none;
            padding: 0;
            margin: 6px 0 0 0;
        }

        button[type="submit"] {
            background: linear-gradient(135deg, #2dd4bf 0%, #8b5cf6 100%);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px -10px rgba(139, 92, 246, 0.6);
            width: 100%;
        }

        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -10px rgba(139, 92, 246, 0.8);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 25px 0;
            color: #64748b;
            font-size: 13px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .divider::before { margin-right: 15px; }
        .divider::after { margin-left: 15px; }

        .social-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 14px;
            border-radius: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .social-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-1px);
        }

        .toggle-btn {
            background: transparent;
            border: 1px solid rgba(45, 212, 191, 0.4);
            color: #2dd4bf;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
            width: 100%;
            text-align: center;
        }

        .toggle-btn:hover {
            background: rgba(45, 212, 191, 0.1);
            border-color: #2dd4bf;
        }

        .toggle-text {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #94a3b8;
        }

        .toggle-text a {
            color: #2dd4bf;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .toggle-text a:hover {
            text-decoration: underline;
        }

        @media (max-width: 900px) {
            .glass-panel {
                flex-direction: column;
                padding: 20px;
                gap: 20px;
                margin: 40px 0;
            }
            .auth-section {
                padding: 30px 20px;
            }
            .auth-section.hidden {
                display: none;
            }
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="glass-panel">

        <!-- Login Section -->
        <div class="auth-section active" id="loginSection">
            <h1>Welcome Back</h1>
            <p class="subtitle">Log in to your account to continue</p>
            <form action="" method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label>Email Address</label>
                    {{ form.email }}
                </div>
                <div class="form-group">
                    <label>Password</label>
                    {{ form.password }}
                </div>
                <button type="submit">Log in</button>
            </form>

            <div class="divider">or</div>

            <button type="button" class="social-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12.0001 11.9998V15.5498H17.8201C17.4351 17.5878 15.6591 19.1498 13.5001 19.1498C10.7401 19.1498 8.50012 16.9098 8.50012 14.1498C8.50012 11.3898 10.7401 9.14984 13.5001 9.14984C14.7731 9.14984 15.9321 9.63784 16.8001 10.4288L19.2971 7.93184C17.7811 6.47184 15.7481 5.54984 13.5001 5.54984C8.75312 5.54984 4.90012 9.40284 4.90012 14.1498C4.90012 18.8968 8.75312 22.7498 13.5001 22.7498C18.2471 22.7498 21.6001 18.8968 21.6001 14.1498C21.6001 13.4118 21.5031 12.6938 21.3251 11.9998H12.0001Z" fill="#fff"/>
                </svg>
                Log in with Google / Github
            </button>

            <p class="toggle-text">Don't have an account? <a onclick="showSignup()">Sign up</a></p>
        </div>

        <!-- Signup Section -->
        <div class="auth-section hidden" id="signupSection">
            <h1>Create Your Account</h1>
            <p class="subtitle">Encouraging you to create your account.</p>
            <form action="" method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit">Submit</button>
            </form>

            <p class="toggle-text">Already have an account? <a onclick="showLogin()">Log in</a></p>
        </div>

    </div>

    <script>
        function showSignup() {
            const loginSection = document.getElementById('loginSection');
            const signupSection = document.getElementById('signupSection');

            loginSection.classList.remove('active');
            loginSection.classList.add('hidden');

            signupSection.classList.remove('hidden');
            signupSection.classList.add('active');
        }

        function showLogin() {
            const loginSection = document.getElementById('loginSection');
            const signupSection = document.getElementById('signupSection');

            signupSection.classList.remove('active');
            signupSection.classList.add('hidden');

            loginSection.classList.remove('hidden');
            loginSection.classList.add('active');
        }
    </script>
</body>
</html>
