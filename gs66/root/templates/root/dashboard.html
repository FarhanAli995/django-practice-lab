<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Django · ECharts Dashboard</title>

  <!-- ECharts 5 via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset & Base ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0e1a;
      --card:      #111827;
      --border:    #1f2a3c;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --indigo:    #6366f1;
      --emerald:   #10b981;
      --amber:     #f59e0b;
      --rose:      #f43f5e;
      --radius:    12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1.5rem;
    }

    /* ── Header ───────────────────────────────────────── */
    header {
      width: 100%;
      max-width: 900px;
      margin-bottom: 2.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    h1 {
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    h1 span {
      /* dataset-colored accent updated by JS */
      color: var(--indigo);
      transition: color 0.4s ease;
    }

    /* ── Selector Buttons ─────────────────────────────── */
    .btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      margin-bottom: 1.8rem;
      width: 100%;
      max-width: 900px;
    }

    .btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      padding: 0.55rem 1.2rem;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: var(--card);
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.25s, color 0.25s, background 0.25s, box-shadow 0.25s;
      position: relative;
      overflow: hidden;
    }

    .btn::after {
      /* shimmer sweep on hover */
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.06) 50%, transparent 70%);
      transform: translateX(-100%);
      transition: transform 0.4s ease;
    }
    .btn:hover::after { transform: translateX(100%); }

    /* Active state: each button gets its dataset color injected via JS */
    .btn.active {
      color: #fff;
      border-color: var(--btn-color, var(--indigo));
      background: color-mix(in srgb, var(--btn-color, var(--indigo)) 14%, var(--card));
      box-shadow: 0 0 16px color-mix(in srgb, var(--btn-color, var(--indigo)) 35%, transparent);
    }

    /* ── Chart Card ───────────────────────────────────── */
    .card {
      width: 100%;
      max-width: 900px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.8rem 2rem;
      position: relative;
    }

    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 1.4rem;
    }

    .metric-label {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .metric-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.6rem;
      font-weight: 600;
      transition: color 0.4s ease;
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--emerald);
      display: inline-block;
      margin-right: 0.4rem;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(16,185,129,0.4); }
      50% { opacity: 0.7; box-shadow: 0 0 0 5px rgba(16,185,129,0); }
    }

    #chart {
      width: 100%;
      height: 360px;
    }

    /* Loading overlay */
    .loading-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--indigo), transparent);
      background-size: 200% 100%;
      animation: slide 1s linear infinite;
      border-radius: var(--radius) var(--radius) 0 0;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .loading-bar.active { opacity: 1; }
    @keyframes slide {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── Footer ───────────────────────────────────────── */
    footer {
      margin-top: 2rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    footer span { color: var(--indigo); }
  </style>
</head>
<body>

  <header>
    <p class="eyebrow">&#9632; live dashboard · django + echarts</p>
    <h1>Analytics <span id="dataset-title">Revenue</span></h1>
  </header>

  <!-- Dataset selector buttons -->
  <div class="btn-group">
    <button class="btn active"
            data-dataset="revenue"
            data-color="#6366f1"
            style="--btn-color:#6366f1">
      ▸ Revenue
    </button>
    <button class="btn"
            data-dataset="users"
            data-color="#10b981"
            style="--btn-color:#10b981">
      ▸ Users
    </button>
    <button class="btn"
            data-dataset="performance"
            data-color="#f59e0b"
            style="--btn-color:#f59e0b">
      ▸ Performance
    </button>
    <button class="btn"
            data-dataset="errors"
            data-color="#f43f5e"
            style="--btn-color:#f43f5e">
      ▸ Errors
    </button>
  </div>

  <!-- Chart card -->
  <div class="card">
    <div class="loading-bar" id="loading-bar"></div>

    <div class="card-meta">
      <div>
        <p class="metric-label">Current Period</p>
        <p class="metric-value" id="metric-display">
          <span class="status-dot"></span>
          <span id="metric-number">—</span>
        </p>
      </div>
      <div style="text-align:right">
        <p class="metric-label">Endpoint</p>
        <p style="font-family:'JetBrains Mono',monospace;font-size:0.72rem;color:var(--muted)" id="endpoint-label">/api/data/revenue/</p>
      </div>
    </div>

    <div id="chart"></div>
  </div>

  <footer>Django dynamic URL → <span>path('api/data/&lt;str:dataset_name&gt;/', ...)</span> → JsonResponse</footer>

  <script>
    // ── ECharts init ─────────────────────────────────────
    const chartDom = document.getElementById('chart');
    const chart = echarts.init(chartDom, null, { renderer: 'canvas' });

    // Base chart option — data is injected dynamically
    function buildOption(labels, data, color, unit) {
      const gradientColor = new echarts.graphic.LinearGradient(0, 0, 0, 1, [
        { offset: 0,   color: color + 'cc' },  // top: 80% opacity
        { offset: 0.7, color: color + '22' },  // mid: 13%
        { offset: 1,   color: color + '00' },  // bottom: transparent
      ]);

      return {
        animation: true,
        animationDuration: 700,
        animationEasing: 'cubicInOut',  // smooth morph between datasets

        grid: { top: 10, right: 10, bottom: 40, left: 55 },

        tooltip: {
          trigger: 'axis',
          backgroundColor: '#1f2a3c',
          borderColor: '#2d3f55',
          borderWidth: 1,
          textStyle: { color: '#e2e8f0', fontFamily: 'JetBrains Mono', fontSize: 12 },
          formatter: (params) => {
            const p = params[0];
            return `${p.axisValue}<br/><b>${p.value} ${unit}</b>`;
          },
        },

        xAxis: {
          type: 'category',
          data: labels,
          axisLine:  { lineStyle: { color: '#1f2a3c' } },
          axisTick:  { show: false },
          axisLabel: { color: '#64748b', fontFamily: 'JetBrains Mono', fontSize: 11 },
        },

        yAxis: {
          type: 'value',
          splitLine: { lineStyle: { color: '#1f2a3c', type: 'dashed' } },
          axisLabel: {
            color: '#64748b',
            fontFamily: 'JetBrains Mono',
            fontSize: 11,
            formatter: (v) => v >= 1000 ? (v/1000).toFixed(1)+'k' : v,
          },
        },

        series: [{
          type: 'line',
          data: data,
          smooth: 0.4,                     // slight curve on the line
          symbol: 'circle',
          symbolSize: 6,
          itemStyle: { color },
          lineStyle: { color, width: 2.5 },
          areaStyle: { color: gradientColor },
          emphasis: {
            itemStyle: {
              color: '#fff',
              borderColor: color,
              borderWidth: 2,
              shadowColor: color,
              shadowBlur: 10,
            },
          },
        }],
      };
    }

    // ── Fetch & render ───────────────────────────────────
    const loadingBar   = document.getElementById('loading-bar');
    const datasetTitle = document.getElementById('dataset-title');
    const metricNumber = document.getElementById('metric-number');
    const endpointLabel = document.getElementById('endpoint-label');
    const metricValue  = document.getElementById('metric-display');
    const buttons      = document.querySelectorAll('.btn');

    async function fetchDataset(name, color) {
      // Construct the URL dynamically — matches path('api/data/<str:dataset_name>/')
      const url = `/api/data/${name}/`;

      loadingBar.classList.add('active');

      try {
        const response = await fetch(url);

        if (!response.ok) {
          const err = await response.json();
          console.error('API error:', err.error);
          return;
        }

        const json = await response.json();

        // Update chart with new data — ECharts animates the morph automatically
        chart.setOption(buildOption(json.labels, json.data, json.color, json.unit));

        // Update UI chrome
        datasetTitle.textContent = name.charAt(0).toUpperCase() + name.slice(1);
        datasetTitle.style.color = json.color;

        // Show last data point as headline metric
        const last = json.data.at(-1);
        metricNumber.textContent = `${last} ${json.unit}`;
        metricValue.style.color  = json.color;

        // Show the exact endpoint that was called
        endpointLabel.textContent = url;

      } catch (err) {
        console.error('Fetch failed:', err);
      } finally {
        loadingBar.classList.remove('active');
      }
    }

    // ── Button click handler ─────────────────────────────
    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        // Swap active class
        buttons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // Fetch the dataset named in data-dataset attribute
        fetchDataset(btn.dataset.dataset, btn.dataset.color);
      });
    });

    // ── Resize support ───────────────────────────────────
    window.addEventListener('resize', () => chart.resize());

    // ── Initial load ─────────────────────────────────────
    fetchDataset('revenue', '#6366f1');
  </script>

</body>
</html>
