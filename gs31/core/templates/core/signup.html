<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Form</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f6f9;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            background:white;
            padding:30px;
            width:400px;
            border-radius:10px;
            box-shadow:0 0 15px rgba(0,0,0,0.1);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
            color:#333;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:16px;
        }

        .buttons{
            display:flex;
            gap:10px;
            margin-top:15px;
        }

        button{
            flex:1;
            padding:12px;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
            color:white;
        }

        .register-btn{
            background:#007bff;
        }

        .register-btn:hover{
            background:#0056b3;
        }

        .reset-btn{
            background:#dc3545;
        }

        .reset-btn:hover{
            background:#b02a37;
        }
    </style>
</head>
<body>

    <div class="container">

        <h2>User Registration</h2>

        {% if messages %}
            {% for message in messages %}
                <div style="color: green; margin-bottom: 15px; text-align: center; font-weight: bold;">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <input type="text" name="username" placeholder="Enter Username" required>

            <input type="email" name="email" placeholder="Enter Email" required>

            <input type="password" name="password" placeholder="Enter Password" required>

            <div class="buttons">
                <button type="submit" class="register-btn">
                    Register
                </button>

            </div>

        </form>

    </div>

</body>
</html>
